<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Blockbuster html-css-js</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barriecito&family=Darumadrop+One&family=Dekko&family=DotGothic16&family=Fredoka:wght@300..700&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IM+Fell+English:ital@0;1&family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&family=Instrument+Serif&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jersey+10&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Pixelify+Sans:wght@400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:wght@100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Walter+Turncoat&display=swap"
        rel="stylesheet">

    <!-- links -->
    <link href="styles.css" rel="stylesheet">

    <script src="script.js" defer></script>

</head>

<body>

    <!-- loader + bar -->
    <div id="loader">
        <div class="loader-inner">
            <div class="loader-bar">
                <div class="loader-fill"></div>
            </div>
            <p class="loader-text">loading...</p>
        </div>
    </div>

    <!-- main, after laoding -->
    <main id="scene">

        <!-- background vid -->
        <video id="bg-video" class="bg-video" muted autoplay playsinline loop>
            <source src="media/backgrnd.webm" type="video/webm">
            <source src="media/backgrnd.mp4" type="video/mp4">

            <p>your browser doesn't support HTML5 video.
                Here is a <a href="media/backgrnd.mp4">link to the video</a> instead.</p>
        </video>

        <!-- second vid on hover (sound is mine even though its muted) -->
        <video id="hover-video" class="bg-video hover-video" muted playsinline loop>
            <source src="media/hover_vid.webm" type="video/webm">
            <source src="media/hover_vid.mp4" type="video/mp4">

            <p>your browser doesn't support HTML5 video.
                Here is a <a href="media/hover_vid.mp4">link to the video</a> instead.</p>
        </video>

        <!-- text on top -->
        <div class="text">
            <p id="pre-words" class="pre-words">
                <span class="pre-word">Live</span>
                <span class="pre-word">in</span>
                <span class="pre-word">the</span>
            </p>
            <h1 id="word-moment" class="moment">MOMENT</h1>
        </div>

    </main>

    <audio id="player">
        <source src="audio/Earrings_full.mp3" type="audio/mp3">
    </audio>


</body>

</html>
